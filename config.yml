#proxy: socks5://127.0.0.1:7890

hosts:
  - https://raw.hellogithub.com/hosts

rule-actions:
  - &run
    action: command
    run: asdsadsad

  - action: IP
    asd: asdsad

rules:
 - [DOMAIN-SUFFIX, gov.cn, BLOCK]
 - [DOMAIN-KEYWORD, taobao, *run]
 - [DOMAIN-REGEX]
 - [DOMAIN]
 - [IP_CIDR]
 - [GEOIP, CN]

middlewares:
  - rules
  - cache
  - hosts
  - block
